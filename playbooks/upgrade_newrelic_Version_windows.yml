- name: Upgrade New Relic Infrastructure Agent to 1.69.0 (Windows)
  hosts: windows
  gather_facts: no

  vars:
    nr_license_key: "{{ lookup('env', 'NEW_RELIC_LICENSE_KEY') }}"
    nr_version: "1.69.0"
    nr_msi_path: "C:\\Temp\\newrelic-infra-{{ nr_version }}.msi"

  tasks:

    - name: Ensure Temp directory exists
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: Ensure New Relic config directory exists
      ansible.windows.win_file:
        path: C:\Program Files\New Relic\newrelic-infra
        state: directory

    - name: Write New Relic license key to config file
      ansible.windows.win_copy:
        dest: C:\Program Files\New Relic\newrelic-infra\newrelic-infra.yml
        content: |
          license_key: "{{ nr_license_key }}"
          log_level: info

    - name: Download New Relic Infrastructure Agent MSI
      ansible.windows.win_get_url:
        url: https://download.newrelic.com/infrastructure_agent/windows/newrelic-infra.1.69.0.msi
        dest: "{{ nr_msi_path }}"
        force: yes

    - name: Install / Upgrade New Relic Infrastructure Agent (in-place)
      ansible.windows.win_package:
        path: "{{ nr_msi_path }}"
        state: present
        arguments: /qn /norestart

    - name: Restart New Relic Infrastructure Agent service
      ansible.windows.win_service:
        name: newrelic-infra
        state: restarted

    - name: Verify New Relic Infrastructure Agent version
      ansible.windows.win_command: >
        "C:\Program Files\New Relic\newrelic-infra\newrelic-infra.exe" --version
      register: nr_version_output

    - name: Show installed New Relic Infrastructure Agent version
      debug:
        var: nr_version_output.stdout
