---
- name: Upgrade New Relic Infrastructure Agent to 1.70.0 (Windows)
  hosts: windows
  gather_facts: no

  tasks:
    - name: Ensure temp directory exists
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: Download New Relic Infra Agent MSI
      ansible.windows.win_get_url:
        url: https://download.newrelic.com/infrastructure_agent/windows/newrelic-infra.1.70.0.msi
        dest: C:\Temp\newrelic-infra-1.70.0.msi

    - name: Upgrade New Relic Infrastructure Agent (in-place)
      ansible.windows.win_package:
        path: C:\Temp\newrelic-infra-1.70.0.msi
        state: present

    - name: Configure New Relic license key (from AWX)
      ansible.windows.win_copy:
        dest: 'C:\Program Files\New Relic\newrelic-infra\newrelic-infra.yml'
        content: |
          license_key: {{ newrelic_license_key }}

    - name: Ensure New Relic Infra service is running
      ansible.windows.win_service:
        name: newrelic-infra
        state: started
        start_mode: auto 
