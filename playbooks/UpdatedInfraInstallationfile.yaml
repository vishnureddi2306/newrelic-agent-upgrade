- name: Install or Upgrade New Relic Infrastructure Agent (Windows)
  hosts: windows
  gather_facts: no

  vars:
    newrelic_config_path: 'C:\Program Files\New Relic\newrelic-infra\newrelic-infra.yml'

  tasks:

    - name: Install or Upgrade New Relic Infrastructure Agent
      ansible.windows.win_package:
        path: https://download.newrelic.com/infrastructure_agent/windows/newrelic-infra.msi
        state: present

    - name: Ensure New Relic config directory exists
      ansible.windows.win_file:
        path: 'C:\Program Files\New Relic\newrelic-infra'
        state: directory

    - name: Configure New Relic license key
      ansible.windows.win_copy:
        dest: "{{ newrelic_config_path }}"
        content: |
          license_key: {{ newrelic_license_key }}

    - name: Ensure New Relic Infrastructure service is running
      ansible.windows.win_service:
        name: newrelic-infra
        state: started
        start_mode: auto
